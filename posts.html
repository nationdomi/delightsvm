<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Editor de Posts · Delights by VM</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="posts.css">
</head>
<body>

  <header class="tool-head">
    <div class="tool-brand">
      <img src="assets/logo.svg" alt="">
      <div>
        <h1>Editor de posts</h1>
        <span></span>
      </div>
    </div>
    <a class="tool-back" href="index.html" title="Volver al sitio">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7M19 12H5"/></svg>
      Sitio
    </a>
  </header>

  <main class="tool-layout">

    <!-- LEFT: preview -->
    <section class="preview-col">
      <div class="preview-frame" id="preview-frame">
        <canvas id="post-canvas" width="1080" height="1350"></canvas>
        <div class="preview-overlay" id="preview-overlay">
          <div class="spinner"></div>
          <span>Preparando…</span>
        </div>
        <div class="rec-badge" id="rec-badge">
          <span class="rec-dot"></span>
          <span>Grabando · <span id="rec-time">0.0</span>s</span>
        </div>
      </div>
      <div class="preview-info">
        <span id="preview-size">1080 × 1350</span>
        <span class="dot"></span>
        <span id="preview-count">0 postres</span>
      </div>
    </section>

    <!-- RIGHT: controls -->
    <aside class="controls-col">

      <!-- FORMATO -->
      <div class="ctrl-block">
        <div class="ctrl-head">
          <h2>Formato</h2>
        </div>
        <div class="chip-row" role="tablist" aria-label="Formato del post">
          <button class="chip active" data-format="portrait" title="Instagram Feed 4:5 (1080×1350)">Feed 4:5</button>
          <button class="chip" data-format="square" title="Instagram Feed 1:1 (1080×1080)">Feed 1:1</button>
          <button class="chip" data-format="story" title="Instagram Story 9:16 (1080×1920)">Story 9:16</button>
        </div>
      </div>

      <!-- ESTILO -->
      <div class="ctrl-block">
        <div class="ctrl-head">
          <h2>Estilo</h2>
        </div>
        <div class="chip-row" role="tablist" aria-label="Estilo de composición">
          <button class="chip active" data-style="grid" title="Grid en 2 columnas con foto grande">Grid </button>
          <button class="chip" data-style="menu" title="Lista vertical estilo menú de boutique">Menú vertical</button>
        </div>
      </div>

      <!-- FONDO -->
      <div class="ctrl-block">
        <div class="ctrl-head">
          <h2>Fondo</h2>
        </div>
        <div class="chip-row" role="tablist" aria-label="Color de fondo">
          <button class="chip active" data-theme="warm" title="Base crema con blush y peach — el original">Claro</button>
          <button class="chip" data-theme="vino" title="Burdeos elegante con detalles crema y oro">Vino </button>
          <button class="chip" data-theme="rosa" title="Blush polvo con gradiente diagonal">Rosa polvo</button>
          <button class="chip" data-theme="terracota" title="Tierra cálida con gradiente diagonal">Terracota</button>
        </div>
      </div>

      <!-- TEXTO -->
      <div class="ctrl-block">
        <div class="ctrl-head">
          <h2>Texto</h2>
        </div>
        <label class="field">
          <span>Título</span>
          <input type="text" id="in-title" value="Disponibles hoy" maxlength="30">
        </label>
        <label class="field">
          <span>Subtítulo <small>(opcional)</small></span>
          <input type="text" id="in-subtitle" placeholder="Ej. sábado 15 · o lo que quieras escribir" maxlength="60">
        </label>
      </div>

      <!-- SELECCIÓN DE POSTRES -->
      <div class="ctrl-block">
        <div class="ctrl-head">
          <h2>Postres <small id="picker-count">0 / 5</small></h2>
          <button class="ctrl-clear" id="btn-clear">Limpiar</button>
        </div>
        <p class="hint"> (puedes poner hasta 5 postres). El orden es el orden de aparición en el video.</p>
        <div class="picker" id="picker"></div>
      </div>

      <!-- DESCARGA -->
      <div class="ctrl-block">
        <div class="ctrl-head">
          <h2>Descargar</h2>
        </div>
        <div class="dl-row">
          <button class="btn-dl btn-img" id="btn-png" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
            <span class="dl-title">Imagen</span>
            <span class="dl-sub">PNG · </span>
          </button>
          <button class="btn-dl btn-vid" id="btn-mp4" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>
            <span class="dl-title">Video 8s</span>
            <span class="dl-sub" id="vid-format">MP4</span>
          </button>
        </div>
        <p class="footnote"></p>
      </div>

    </aside>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"><span id="toast-text"></span></div>

  <script src="products.js"></script>
  <script src="posts.js"></script>
</body>
</html>
